# .github/workflows/sync-results.yml
name: Sync Mundial 2026 Results

on:
  schedule:
    # Cada 2 minutos, todo el día
    - cron: '*/2 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no escribe en Firebase)'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run sync (ESPN)
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: node scripts/sync_results.mjs
